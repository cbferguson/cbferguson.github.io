<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Screen Pop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0E11;
    --surface: #141920;
    --surface-raised: #1A2029;
    --border: rgba(255,255,255,0.06);
    --border-accent: rgba(56,189,248,0.2);
    --text-primary: #E8ECF1;
    --text-secondary: #8A94A6;
    --text-muted: #5A6478;
    --accent: #38BDF8;
    --accent-glow: rgba(56,189,248,0.12);
    --green: #34D399;
    --green-glow: rgba(52,211,153,0.12);
    --amber: #FBBF24;
    --amber-glow: rgba(251,191,36,0.1);
    --red: #F87171;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(56,189,248,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(52,211,153,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Loading State */
  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.3s ease;
  }
  .loader-ring {
    width: 48px;
    height: 48px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  .loader-text {
    color: var(--text-secondary);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  /* Error / Not Found State */
  .error-container {
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .error-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
  }
  .error-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .error-msg {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.5;
  }
  .error-detail {
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: inline-block;
  }

  /* Main Card */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,0.45);
  }

  /* Header bar */
  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(56,189,248,0.03) 0%, transparent 100%);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green);
    background: var(--green-glow);
    border: 1px solid rgba(52,211,153,0.15);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }
  .header-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .header-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Customer identity section */
  .customer-identity {
    padding: 24px 20px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #818CF8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: -0.02em;
    box-shadow: 0 4px 16px rgba(56,189,248,0.2);
  }
  .identity-info {
    flex: 1;
    min-width: 0;
  }
  .customer-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .customer-acct {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    padding: 3px 9px;
    border-radius: 6px;
  }

  /* Detail rows */
  .details {
    padding: 6px 0;
  }
  .detail-row {
    display: flex;
    align-items: flex-start;
    padding: 12px 20px;
    gap: 12px;
    transition: background 0.15s ease;
  }
  .detail-row:hover {
    background: rgba(255,255,255,0.015);
  }
  .detail-icon {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .detail-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--text-secondary);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .detail-content {
    flex: 1;
    min-width: 0;
  }
  .detail-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .detail-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .detail-value.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.03em;
  }

  /* Footer */
  .card-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(0deg, rgba(0,0,0,0.15) 0%, transparent 100%);
  }
  .footer-brand {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .footer-brand svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.8;
  }
  .footer-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Animations */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Detail row stagger */
  .detail-row { animation: fadeIn 0.35s ease backwards; }
  .detail-row:nth-child(1) { animation-delay: 0.15s; }
  .detail-row:nth-child(2) { animation-delay: 0.22s; }
  .detail-row:nth-child(3) { animation-delay: 0.29s; }
  .detail-row:nth-child(4) { animation-delay: 0.36s; }

  /* Responsive */
  @media (max-width: 520px) {
    body { padding: 12px; }
    .card { border-radius: 14px; }
    .customer-name { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loader-container" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Looking up customer…</div>
  </div>
</div>

<script>
const API_BASE = 'https://67fad7058ee14a542628b6d7.mockapi.io/userDB';
const app = document.getElementById('app');

function getParams() {
  const params = new URLSearchParams(window.location.search);
  // Support both 'phoneNumber' and 'ANI' as parameter names
  return {
    phoneNumber: params.get('phoneNumber') || params.get('ANI') || params.get('ani') || '',
    agentName: params.get('AgentName') || params.get('agentName') || '',
    queueName: params.get('QueueName') || params.get('queueName') || '',
    interactionId: params.get('InteractionID') || params.get('interactionId') || ''
  };
}

function normalizePhone(raw) {
  // Strip everything that isn't a digit
  const digits = raw.replace(/\D/g, '');
  // If 11 digits starting with 1, drop the leading 1
  if (digits.length === 11 && digits.startsWith('1')) return digits.slice(1);
  // If 10 digits, return as-is
  if (digits.length === 10) return digits;
  return digits;
}

function formatPhoneDisplay(digits) {
  if (digits.length === 10) {
    return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  return digits;
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function getTimeNow() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function showError(title, msg, detail) {
  app.innerHTML = `
    <div class="error-container">
      <div class="error-icon">✕</div>
      <div class="error-title">${title}</div>
      <div class="error-msg">${msg}</div>
      ${detail ? `<div class="error-detail">${detail}</div>` : ''}
    </div>`;
}

function renderCustomer(customer, params) {
  const digits = normalizePhone(customer.phoneNumber);
  const phoneFmt = formatPhoneDisplay(digits);
  const initials = getInitials(customer.name);
  const time = getTimeNow();
  const interactionShort = params.interactionId ? params.interactionId.slice(0, 12) + '…' : `REC-${customer.id.padStart(5,'0')}`;

  app.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="header-left">
          <div class="live-badge"><div class="live-dot"></div>Inbound Call</div>
          <span class="header-label">${params.queueName || 'Customer Assist'}</span>
        </div>
        <span class="header-time">${time}</span>
      </div>

      <div class="customer-identity">
        <div class="avatar">${initials}</div>
        <div class="identity-info">
          <div class="customer-name">${customer.name}</div>
          <div class="customer-acct">
            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            ${customer.acctName}
          </div>
        </div>
      </div>

      <div class="details">
        <div class="detail-row">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div class="detail-content">
            <div class="detail-label">Phone Number</div>
            <div class="detail-value mono">${phoneFmt}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div class="detail-content">
            <div class="detail-label">Address</div>
            <div class="detail-value">${customer.addressStreet}<br>${customer.addressCity}, ${customer.addressState}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </div>
          <div class="detail-content">
            <div class="detail-label">Security PIN</div>
            <div class="detail-value mono">${customer.pin}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="detail-content">
            <div class="detail-label">Customer ID</div>
            <div class="detail-value mono">#${customer.id.padStart(5, '0')}</div>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <div class="footer-brand">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Screen Pop
        </div>
        <div class="footer-id">${interactionShort}</div>
      </div>
    </div>`;
}

async function init() {
  const params = getParams();

  if (!params.phoneNumber) {
    showError('No Phone Number', 'No caller phone number was provided in the URL parameters.', 'Expected: ?phoneNumber=+1XXXXXXXXXX');
    return;
  }

  const normalized = normalizePhone(params.phoneNumber);

  try {
    // Fetch all records and match client-side for flexibility
    const res = await fetch(API_BASE);
    if (!res.ok) throw new Error(`API returned ${res.status}`);
    const data = await res.json();

    // Match by normalized digits
    const match = data.find(record => {
      const recDigits = normalizePhone(record.phoneNumber);
      return recDigits === normalized;
    });

    if (match) {
      renderCustomer(match, params);
    } else {
      showError(
        'Customer Not Found',
        'No matching customer record was found for this caller.',
        `ANI: ${params.phoneNumber} → ${normalized}`
      );
    }
  } catch (err) {
    showError('Connection Error', 'Unable to reach the customer database.', err.message);
  }
}

init();
</script>
</body>
</html>
