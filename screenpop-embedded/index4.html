<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Pop — Webex Sidebar</title>
<script src="https://unpkg.com/@webex/embedded-app-sdk@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1116; --bg-surface: #181b22; --bg-card: #1e222c;
    --accent: #00cf7f; --accent-dim: rgba(0,207,127,0.12);
    --webex: #049fd9; --webex-dim: rgba(4,159,217,0.12);
    --text: #e4e8f0; --text-2: #8892a8; --text-3: #555e74;
    --border: rgba(255,255,255,0.06);
    --danger: #ff4d6a; --danger-dim: rgba(255,77,106,0.1);
    --r: 10px;
  }
  body.light-theme {
    --bg: #f5f6f8; --bg-surface: #fff; --bg-card: #eef0f4;
    --text: #1a1a2e; --text-2: #555e74; --text-3: #8892a8;
    --border: rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); width:100%; min-height:100vh; }

  .header { padding:14px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); background:var(--bg-surface); position:sticky; top:0; z-index:10; }
  .header-logo { width:28px; height:28px; border-radius:7px; background:linear-gradient(135deg,var(--webex),var(--accent)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
  .header h1 { font-size:14px; font-weight:600; flex:1; }
  .header-status { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; padding:3px 8px; border-radius:4px; }
  .header-status.ready { background:var(--accent-dim); color:var(--accent); }
  .header-status.error { background:var(--danger-dim); color:var(--danger); }
  .header-status.loading { background:var(--webex-dim); color:var(--webex); }

  .content { padding:14px; }

  .idle-state { text-align:center; padding:40px 16px; }
  .idle-icon { width:64px; height:64px; border-radius:16px; margin:0 auto 16px; background:var(--bg-card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:28px; }
  .idle-state h3 { font-size:16px; font-weight:600; margin-bottom:6px; }
  .idle-state p { font-size:13px; color:var(--text-2); line-height:1.5; }

  .ring-state { display:none; text-align:center; padding:28px 16px; animation:fadeUp .3s ease; }
  .ring-state.active { display:block; }
  .ring-anim { width:72px; height:72px; border-radius:50%; margin:0 auto 16px; background:var(--accent-dim); display:flex; align-items:center; justify-content:center; font-size:32px; animation:ring-pulse 1s ease-in-out infinite; position:relative; }
  .ring-anim::before,.ring-anim::after { content:''; position:absolute; border-radius:50%; border:2px solid var(--accent); opacity:0; animation:ripple 1.5s ease-out infinite; }
  .ring-anim::before { inset:-8px; } .ring-anim::after { inset:-20px; animation-delay:.4s; }
  @keyframes ring-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  @keyframes ripple { 0%{opacity:.5;transform:scale(.9)} 100%{opacity:0;transform:scale(1.1)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .ring-number { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; margin-bottom:4px; }
  .ring-label { font-size:13px; color:var(--text-2); }
  .ring-dots { display:flex; gap:6px; justify-content:center; margin-top:16px; }
  .ring-dots span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s ease-in-out infinite; }
  .ring-dots span:nth-child(2){animation-delay:.15s} .ring-dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

  .customer-card { display:none; animation:fadeUp .35s cubic-bezier(.16,1,.3,1); }
  .customer-card.active { display:block; }
  .card-hero { background:linear-gradient(135deg,rgba(4,159,217,.08),rgba(0,207,127,.06)); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
  .card-avatar { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg,var(--webex),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; flex-shrink:0; }
  .card-name { font-size:18px; font-weight:700; } .card-phone { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--webex); margin-top:3px; }
  .card-badge { margin-left:auto; padding:4px 10px; border-radius:5px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; }
  .card-badge.ok { background:var(--accent-dim); color:var(--accent); }
  .card-fields { display:flex; flex-direction:column; gap:8px; }
  .card-field { padding:14px 16px; border-radius:var(--r); background:var(--bg-card); border:1px solid var(--border); }
  .card-field-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--text-3); margin-bottom:6px; }
  .card-field-value { font-size:14px; font-weight:500; line-height:1.4; }

  .no-match-card { display:none; text-align:center; padding:28px 16px; animation:fadeUp .35s ease; }
  .no-match-card.active { display:block; }
  .no-match-card .nm-icon { font-size:40px; margin-bottom:12px; opacity:.6; }
  .no-match-card h3 { font-size:16px; font-weight:600; margin-bottom:6px; }
  .no-match-card p { font-size:13px; color:var(--text-2); line-height:1.5; }

  .call-controls { display:none; margin-top:10px; padding:12px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); align-items:center; justify-content:space-between; }
  .call-controls.active { display:flex; }
  .cc-timer { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; color:var(--accent); letter-spacing:2px; }
  .cc-label { font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.8px; font-weight:500; }
  .cc-state { font-size:11px; color:var(--text-2); text-transform:capitalize; padding:3px 8px; border-radius:4px; background:var(--bg-surface); }

  /* Debug log — always visible for troubleshooting */
  .debug-log { margin-top:14px; padding:12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); max-height:180px; overflow-y:auto; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-3); line-height:1.6; }
  .debug-log .err { color:var(--danger); }
  .debug-log .ok { color:var(--accent); }
</style>
</head>
<body>
  <div class="header">
    <div class="header-logo">SP</div>
    <h1>Screen Pop</h1>
    <span class="header-status loading" id="statusBadge">Initializing...</span>
  </div>
  <div class="content">
    <div class="idle-state" id="idleState">
      <div class="idle-icon">📞</div>
      <h3>Waiting for Calls</h3>
      <p>Customer info will appear here when an inbound call is detected.</p>
    </div>
    <div class="ring-state" id="ringState">
      <div class="ring-anim">📲</div>
      <div class="ring-number" id="ringNumber"></div>
      <div class="ring-label">Incoming Call — Looking up...</div>
      <div class="ring-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="customer-card" id="customerCard"></div>
    <div class="no-match-card" id="noMatchCard">
      <div class="nm-icon">🔍</div>
      <h3>Unknown Caller</h3>
      <p id="noMatchMsg"></p>
    </div>
    <div class="call-controls" id="callControls">
      <div><div class="cc-label">Duration</div><div class="cc-timer" id="timerDisplay">00:00</div></div>
      <span class="cc-state" id="callState">—</span>
    </div>
    <div class="debug-log" id="debugLog"></div>
  </div>

<script>
// ─── Config ───
const CONFIG = {
  apiUrl: 'https://67fad7058ee14a542628b6d7.mockapi.io/userDB',
  phoneField: 'phoneNumber',
  hiddenFields: ['pin'],
};

var eafApp = null;
var sidebar = null;
var currentCallId = null;
var timerHandle = null;
var timerSecs = 0;
var badgeCount = 0;

// ─── Debug Logger (visible by default) ───
function log(msg, cls) {
  console.log('[screenpop]', msg);
  var el = document.getElementById('debugLog');
  var t = new Date().toLocaleTimeString('en-US', { hour12: false });
  el.innerHTML += '<div class="' + (cls || '') + '">' + t + ' — ' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

// ─── Utilities ───
function norm(p) { return (p||'').replace(/[^0-9]/g,'').replace(/^1(\d{10})$/,'$1'); }
function fmt(p) { var d=norm(p); return d.length===10?'('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6):p; }
function initials(n) { return n.split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2); }
function stripHidden(r) { var s=Object.assign({},r); CONFIG.hiddenFields.forEach(function(f){delete s[f]}); return s; }

// ─── UI ───
function setState(s) {
  ['idleState','ringState','customerCard','noMatchCard'].forEach(function(id) {
    var el = document.getElementById(id);
    el.classList.remove('active');
    if (id==='idleState') el.style.display='none';
  });
  if (s==='idle') { document.getElementById('idleState').style.display='block'; document.getElementById('callControls').classList.remove('active'); }
  else if (s==='ring') document.getElementById('ringState').classList.add('active');
  else if (s==='match') document.getElementById('customerCard').classList.add('active');
  else if (s==='nomatch') document.getElementById('noMatchCard').classList.add('active');
}
function startTimer() {
  timerSecs=0; document.getElementById('callControls').classList.add('active');
  clearInterval(timerHandle);
  timerHandle=setInterval(function(){ timerSecs++; var m=String(Math.floor(timerSecs/60)).padStart(2,'0'); var s=String(timerSecs%60).padStart(2,'0'); document.getElementById('timerDisplay').textContent=m+':'+s; },1000);
}
function stopTimer() { clearInterval(timerHandle); }
function setStatus(type, text) { var b=document.getElementById('statusBadge'); b.className='header-status '+type; b.textContent=text; }

// ─── DB Lookup ───
function lookupCaller(ani) {
  var normalized = norm(ani);
  if (!normalized) return Promise.resolve(null);
  log('DB lookup: ' + normalized);
  return fetch(CONFIG.apiUrl)
    .then(function(r){return r.json()})
    .then(function(records){
      var match = records.find(function(r){return norm(r[CONFIG.phoneField]||'')===normalized});
      log(match ? 'Match: '+match.name : 'No match', match?'ok':'');
      return match ? stripHidden(match) : null;
    })
    .catch(function(err){ log('API error: '+err.message,'err'); return null; });
}

// ─── Call Handler ───
function handleCallStateChange(call) {
  log('Call event: ' + JSON.stringify(call));

  var state = call.state || call.status || '';
  var ani = call.callerID || call.callerId || '';
  var callId = call.id || call.callId || ('unknown-'+Date.now());

  log('Parsed: state=' + state + ', ANI=' + ani + ', id=' + callId);

  // Update state label if same call
  if (callId === currentCallId) {
    document.getElementById('callState').textContent = state;
  }

  // Call ended
  if (state === 'Disconnected' || state === 'disconnected' || state === 'Released' || state === 'released' || state === 'ended') {
    log('Call ended: ' + callId, 'ok');
    currentCallId = null;
    stopTimer();
    setState('idle');
    document.getElementById('idleState').style.display = 'block';
    if (sidebar) { try { sidebar.clearBadge(); } catch(e){} }
    badgeCount = 0;
    return;
  }

  // New incoming call — Webex uses "Started", "alerting", "ringing", "offered"
  if (callId !== currentCallId) {
    currentCallId = callId;
    log('NEW INCOMING CALL: ANI=' + ani + ', state=' + state, 'ok');

    // Badge
    if (sidebar) {
      badgeCount++;
      try { sidebar.showBadge({ badgeType: 'count', count: badgeCount }); }
      catch(e) { log('Badge error: '+e, 'err'); }
    }

    // Show ringing
    document.getElementById('ringNumber').textContent = fmt(ani);
    setState('ring');
    startTimer();
    document.getElementById('callState').textContent = state;

    // Lookup
    lookupCaller(ani).then(function(customer) {
      if (customer) {
        showCustomer(customer, ani);
      } else {
        document.getElementById('noMatchMsg').innerHTML =
          'No record for <strong style="font-family:JetBrains Mono,monospace">'+fmt(ani)+'</strong> in the database.';
        setState('nomatch');
      }
    });
  }
}

function showCustomer(c, num) {
  document.getElementById('customerCard').innerHTML =
    '<div class="card-hero"><div class="card-avatar">'+initials(c.name)+'</div><div><div class="card-name">'+c.name+'</div><div class="card-phone">'+fmt(num)+'</div></div><div class="card-badge ok">Match</div></div>'+
    '<div class="card-fields">'+
    '<div class="card-field"><div class="card-field-label">Account Type</div><div class="card-field-value">'+(c.acctName||'—')+'</div></div>'+
    '<div class="card-field"><div class="card-field-label">Address</div><div class="card-field-value">'+(c.addressStreet||'')+'<br>'+(c.addressCity||'')+', '+(c.addressState||'')+'</div></div>'+
    '<div class="card-field"><div class="card-field-label">Customer ID</div><div class="card-field-value" style="font-family:JetBrains Mono,monospace">#'+c.id+'</div></div>'+
    '<div class="card-field"><div class="card-field-label">Phone on File</div><div class="card-field-value" style="font-family:JetBrains Mono,monospace">'+(c.phoneNumber||'—')+'</div></div>'+
    '</div>';
  setState('match');
}

// ─── EAF Init — uses exact pattern from Webex docs ───
// Poll for SDK availability
var sdkPollTimer = setInterval(function() {
  // v2: window.webex.Application  |  v1: window.Webex.Application
  if (window.webex && window.webex.Application) {
    clearInterval(sdkPollTimer);
    log('SDK v2 found (window.webex.Application)', 'ok');
    bootApp('v2');
  } else if (window.Webex && window.Webex.Application) {
    clearInterval(sdkPollTimer);
    log('SDK v1 found (window.Webex.Application)', 'ok');
    bootApp('v1');
  }
}, 100);

// Timeout after 15 seconds
setTimeout(function() {
  clearInterval(sdkPollTimer);
  if (!eafApp) {
    log('SDK not found after 15s. window.webex=' + typeof window.webex + ', window.Webex=' + typeof window.Webex, 'err');
    setStatus('error', 'SDK Timeout');
  }
}, 15000);

function bootApp(version) {
  log('Creating Application object (SDK ' + version + ')...');

  // Create the app using the correct constructor
  if (version === 'v2') {
    eafApp = new window.webex.Application();
  } else {
    eafApp = new window.Webex.Application();
  }

  // Follow the exact Webex docs pattern:
  // onReady() -> listen() -> on()
  eafApp.onReady().then(function() {
    log('onReady resolved — app is inside Webex', 'ok');
    log('isPiiEnabled: ' + eafApp.isPiiEnabled);
    log('displayContext: ' + eafApp.displayContext);

    // Theme
    if (eafApp.theme === 'LIGHT') document.body.classList.add('light-theme');

    setStatus('loading', 'Listening...');

    // CRITICAL: listen() must resolve BEFORE registering on() handlers
    eafApp.listen().then(function() {
      log('listen() resolved — registering event handlers', 'ok');

      // Call monitoring
      eafApp.on("sidebar:callStateChanged", function(call) {
        log('EVENT: sidebar:callStateChanged fired!', 'ok');
        handleCallStateChange(call);
      });

      // Theme changes
      eafApp.on("application:themeChanged", function(theme) {
        log('Theme changed: ' + theme);
        document.body.classList.toggle('light-theme', theme === 'LIGHT');
      });

      // View state (for badge management)
      eafApp.on("application:viewStateChanged", function(viewState) {
        log('View state: ' + viewState);
      });

      setStatus('ready', 'Ready');
      log('All event handlers registered — waiting for calls', 'ok');

      // Try to get sidebar context for badge/getCalls
      try {
        eafApp.getSidebar().then(function(sb) {
          sidebar = sb;
          log('getSidebar() OK', 'ok');

          // Check for any active calls
          sidebar.getCalls().then(function(calls) {
            log('Active calls: ' + JSON.stringify(calls));
            if (calls && calls.length > 0) {
              calls.forEach(function(c) {
                log('Existing call: state=' + c.state + ', callerID=' + c.callerID);
              });
              // Process the first alerting/ringing/Started call
              var active = calls.find(function(c) {
                return c.state==='Started'||c.state==='alerting'||c.state==='ringing'||c.state==='Connected'||c.state==='connected';
              });
              if (active) handleCallStateChange(active);
            }
          }).catch(function(e) { log('getCalls error: ' + e, 'err'); });
        }).catch(function(e) { log('getSidebar error: ' + e, 'err'); });
      } catch(e) {
        log('getSidebar exception: ' + e, 'err');
      }

    }).catch(function(reason) {
      log('listen() FAILED: ' + reason, 'err');
      setStatus('error', 'Listen Failed');
    });

  }).catch(function(err) {
    log('onReady FAILED: ' + err, 'err');
    setStatus('error', 'Init Failed');
  });
}

// ─── Init UI ───
setState('idle');
document.getElementById('idleState').style.display = 'block';
log('Page loaded — waiting for SDK...');
</script>
</body>
</html>
