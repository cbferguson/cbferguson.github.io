<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Pop — Webex Sidebar</title>
  <!-- Webex Embedded App Framework SDK v2 (required for sidebar call monitoring) -->
  <script src="https://unpkg.com/@webex/embedded-app-sdk@latest" defer></script>
  <script src="app.js" defer></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f1117;
      --bg-card: #181a24;
      --bg-card-alt: #1e2130;
      --bg-input: #232638;
      --border: #2a2d3e;
      --text-primary: #e8eaed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c6070;
      --accent: #4a6cf7;
      --accent-light: #6b8aff;
      --accent-dim: rgba(74, 108, 247, 0.12);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.12);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.12);
      --cyan: #22d3ee;
      --cyan-dim: rgba(34, 211, 238, 0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --sidebar-width: 380px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: var(--font-display);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    #app { max-width: var(--sidebar-width); margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; z-index: 100; }
    .header-logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 600; flex: 1; }
    .header-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .header-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .status-ready { background: var(--green-dim); color: var(--green); }
    .status-ready::before { background: var(--green); }
    .status-ringing { background: var(--amber-dim); color: var(--amber); animation: pulse-badge 1s infinite; }
    .status-ringing::before { background: var(--amber); }
    .status-active { background: var(--cyan-dim); color: var(--cyan); }
    .status-active::before { background: var(--cyan); }
    .status-ended { background: var(--red-dim); color: var(--red); }
    .status-ended::before { background: var(--red); }
    .status-init { background: var(--accent-dim); color: var(--accent-light); }
    .status-init::before { background: var(--accent-light); }
    @keyframes pulse-badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* Content */
    .content { flex: 1; padding: 16px; overflow-y: auto; }
    .idle-state { text-align: center; padding: 50px 20px; }
    .idle-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .idle-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .idle-subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .ringing-state { text-align: center; padding: 40px 20px; animation: fadeIn 0.3s ease; }
    .ringing-icon { font-size: 40px; margin-bottom: 12px; animation: ring-shake 0.5s infinite; }
    @keyframes ring-shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(12deg); } 75% { transform: rotate(-12deg); } }
    .ringing-label { font-size: 14px; font-weight: 600; color: var(--amber); margin-bottom: 4px; }
    .ringing-number { font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono); }
    .lookup-spinner { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted); font-size: 12px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .caller-card { animation: slideUp 0.35s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .caller-header { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; }
    .caller-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .caller-name { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .caller-account-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-checking { background: var(--green-dim); color: var(--green); }
    .badge-savings { background: var(--accent-dim); color: var(--accent-light); }
    .badge-investment { background: var(--amber-dim); color: var(--amber); }
    .badge-mortgage { background: var(--cyan-dim); color: var(--cyan); }
    .badge-unknown { background: var(--red-dim); color: var(--red); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .info-cell { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
    .info-cell.full { grid-column: 1 / -1; }
    .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 3px; font-weight: 600; }
    .info-value { font-size: 13px; font-weight: 500; color: var(--text-primary); word-break: break-word; }
    .info-value.mono { font-family: var(--font-mono); letter-spacing: 0.5px; }
    .info-value.pin { font-family: var(--font-mono); font-size: 15px; letter-spacing: 3px; font-weight: 700; color: var(--amber); }
    .call-timer-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
    .call-timer-bar.active { border-color: var(--cyan); background: var(--cyan-dim); }
    .call-timer-bar.ended { border-color: var(--red); background: var(--red-dim); }
    .timer-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .timer-value { font-family: var(--font-mono); font-size: 16px; font-weight: 700; }
    .timer-value.active { color: var(--cyan); }
    .timer-value.ended { color: var(--red); }
    .call-ended-note { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; font-style: italic; }
    .unknown-caller { text-align: center; padding: 30px 20px; animation: fadeIn 0.3s ease; }
    .unknown-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
    .unknown-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .unknown-number { font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono); margin-bottom: 14px; }
    .back-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .history-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
    .history-header { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .history-count { font-size: 10px; background: var(--accent-dim); color: var(--accent-light); padding: 1px 6px; border-radius: 10px; font-weight: 600; }
    .history-list { list-style: none; }
    .history-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; transition: all var(--transition); }
    .history-item:hover { border-color: var(--accent); background: var(--bg-card-alt); }
    .history-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent-light); flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 11px; color: var(--text-muted); }
    .history-duration { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); }
    .history-empty { text-align: center; padding: 16px; font-size: 12px; color: var(--text-muted); }
    .history-detail { animation: slideUp 0.3s ease; }
    .history-detail-back { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent-light); cursor: pointer; padding: 6px 0; margin-bottom: 12px; border: none; background: none; font-family: inherit; transition: opacity var(--transition); }
    .history-detail-back:hover { opacity: 0.7; }
    .demo-bar { padding: 10px 16px; background: var(--amber-dim); border-top: 1px solid rgba(251, 191, 36, 0.2); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .demo-label { font-size: 11px; font-weight: 600; color: var(--amber); text-transform: uppercase; letter-spacing: 0.5px; }
    .demo-btn { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; font-family: inherit; font-weight: 500; transition: all var(--transition); }
    .demo-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .demo-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .log-section { border-top: 1px solid var(--border); background: var(--bg-card); }
    .log-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border: none; background: none; color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .log-toggle:hover { color: var(--text-primary); }
    .log-chevron { transition: transform var(--transition); font-size: 10px; }
    .log-chevron.open { transform: rotate(180deg); }
    .log-container { max-height: 200px; overflow-y: auto; padding: 0 16px 10px; }
    .log-entry { font-size: 11px; font-family: var(--font-mono); padding: 3px 0; color: var(--text-muted); display: flex; gap: 6px; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-type { font-weight: 600; flex-shrink: 0; min-width: 40px; }
    .log-type.call { color: var(--green); }
    .log-type.error { color: var(--red); }
    .log-type.warn { color: var(--amber); }
    .log-type.info { color: var(--accent-light); }
    .log-type.demo { color: var(--amber); }
    .log-type.crm { color: var(--green); }
    .log-msg { word-break: break-all; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">SP</div>
    <div class="header-title">Screen Pop</div>
    <div class="header-status status-init" id="statusBadge">Initializing</div>
  </div>
  <div class="content" id="mainContent">
    <div class="idle-state" id="idleView">
      <div class="idle-icon">📞</div>
      <div class="idle-title">Waiting for Calls</div>
      <div class="idle-subtitle">Customer info will appear here when an inbound call is detected.</div>
    </div>
    <div class="ringing-state" id="ringingView" style="display:none;">
      <div class="ringing-icon">📲</div>
      <div class="ringing-label">Incoming Call — Looking up...</div>
      <div class="ringing-number" id="ringingNumber"></div>
      <div class="lookup-spinner"><div class="spinner"></div> Searching CRM...</div>
    </div>
    <div class="caller-card" id="callerView" style="display:none;"></div>
    <div class="unknown-caller" id="unknownView" style="display:none;">
      <div class="unknown-icon">🔍</div>
      <div class="unknown-title">Unknown Caller</div>
      <div class="unknown-number" id="unknownNumber"></div>
      <button class="back-btn" onclick="resetToIdle()">← Back to Waiting</button>
    </div>
    <div class="history-detail" id="historyDetailView" style="display:none;"></div>
    <div class="history-section" id="historySection">
      <div class="history-header">Call History <span class="history-count" id="historyCount">0</span></div>
      <ul class="history-list" id="historyList"><li class="history-empty">No calls yet.</li></ul>
    </div>
  </div>
  <div class="demo-bar" id="demoBar" style="display:none;">
    <span class="demo-label">Demo</span>
    <button class="demo-btn" id="demoCallBtn" onclick="simulateCall()">Simulate Call</button>
    <button class="demo-btn" onclick="simulateUnknownCall()">Unknown #</button>
  </div>
  <div class="log-section">
    <button class="log-toggle" onclick="toggleLog()">Event Log <span class="log-chevron" id="logChevron">▼</span></button>
    <div class="log-container" id="logContainer" style="display:none;"></div>
  </div>
</div>
</body>
</html>
